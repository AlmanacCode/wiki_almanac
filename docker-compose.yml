services:
  database:
    image: mariadb:10.11
    container_name: wiki-almanac-db
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: wiki_almanac
      MARIADB_ROOT_PASSWORD: rootpass
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - mediawiki_db:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 20

  mediawiki:
    image: mediawiki:1.41
    container_name: wiki-almanac-mediawiki
    restart: unless-stopped
    depends_on:
      database:
        condition: service_healthy
    ports:
      - "8080:80"
    volumes:
      - mediawiki_html:/var/www/html

volumes:
  mediawiki_db:
  mediawiki_html:
